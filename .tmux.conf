# Set indexing to 1
set -g base-index 1
setw -g pane-base-index 1

# Set leader keys to Ctrl+Space
unbind C-b
set -g prefix C-Space

# Turn on mouse so we can scroll and click between panes
set -g mouse on

# Set tmux bar to transparent. I dont like any extra distracting colors
set -g status-style bg=default

# Only show the time 
set -g status-right "%H:%M"

set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'


run '~/.tmux/plugins/tpm/tpm'

